<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Full scientific calculator with history"><title>Scientific Calculator — DevKit Tools</title><style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--accent:#58a6ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;padding:40px 16px;min-height:100vh;}
h1{color:#f0f6fc;margin-bottom:20px;font-size:20px;}
.calc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:340px;}
.display{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;text-align:right;}
.expr{font-size:14px;color:var(--text);min-height:20px;word-break:break-all;}
.result{font-size:28px;font-weight:600;color:#f0f6fc;min-height:36px;}
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
button{padding:14px;font-size:16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-weight:500;background:var(--surface);color:var(--text);}
button:hover{background:#30363d;}
button.op{color:var(--accent);}
button.eq{background:#238636;color:#fff;border-color:#238636;}
button.eq:hover{background:#2ea043;}
button.fn{color:#f0c040;font-size:13px;}
.history{width:340px;margin-top:16px;max-height:200px;overflow-y:auto;}
.history div{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;display:flex;justify-content:space-between;}
.history div:hover{background:var(--surface);}
/* 响应式设计 */
@media (max-width: 768px) {
  body { padding: 12px; }
  header { padding: 12px 16px; flex-direction: column; }
  .container { max-width: 100%; padding: 0 8px; }
  h1 { font-size: 1.5rem; }
  textarea, input, select, button { width: 100%; }
  .grid { grid-template-columns: 1fr; }
  .card { padding: 12px; }
}</style></head><body>
<h1>🔢 Scientific Calculator</h1>
<div class="calc">
<div class="display"><div class="expr" id="expr"></div><div class="result" id="result">0</div></div>
<div class="buttons">
<button class="fn" onclick="fn('sin')">sin</button><button class="fn" onclick="fn('cos')">cos</button><button class="fn" onclick="fn('tan')">tan</button><button class="fn" onclick="fn('sqrt')">√</button>
<button class="fn" onclick="fn('log')">log</button><button class="fn" onclick="fn('ln')">ln</button><button class="fn" onclick="fn('pow')">xʸ</button><button class="fn" onclick="fn('pi')">π</button>
<button onclick="input('7')">7</button><button onclick="input('8')">8</button><button onclick="input('9')">9</button><button class="op" onclick="input('/')">÷</button>
<button onclick="input('4')">4</button><button onclick="input('5')">5</button><button onclick="input('6')">6</button><button class="op" onclick="input('*')">×</button>
<button onclick="input('1')">1</button><button onclick="input('2')">2</button><button onclick="input('3')">3</button><button class="op" onclick="input('-')">−</button>
<button onclick="input('0')">0</button><button onclick="input('.')">.</button><button onclick="clearAll()">C</button><button class="op" onclick="input('+')">+</button>
<button onclick="backspace()" style="grid-column:1/3">⌫</button><button class="eq" onclick="calc()" style="grid-column:3/5">=</button>
</div></div>
<div class="history" id="history"></div>
<script>
'use strict';
let expr='',history=[];
function input(v){expr+=v;render()}
function fn(f){if(f==='pi'){input(Math.PI.toFixed(6))}else{expr+=f+'(';render()}}
function clearAll(){expr='';render()}
function backspace(){expr=expr.slice(0,-1);render()}
function calc(){
  try{let e=expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');e=e.replace(/sin\(([^)]+)\)/g,(_,x)=>Math.sin(eval(x)));e=e.replace(/cos\(([^)]+)\)/g,(_,x)=>Math.cos(eval(x)));e=e.replace(/tan\(([^)]+)\)/g,(_,x)=>Math.tan(eval(x)));e=e.replace(/log\(([^)]+)\)/g,(_,x)=>Math.log10(eval(x)));e=e.replace(/ln\(([^)]+)\)/g,(_,x)=>Math.log(eval(x)));e=e.replace(/sqrt\(([^)]+)\)/g,(_,x)=>Math.sqrt(eval(x)));e=e.replace(/pow\(([^,]+),([^)]+)\)/g,(_,x,y)=>Math.pow(eval(x),eval(y)));
  const r=eval(e);history.unshift({expr:expr,result:Number(r.toFixed(10))});if(history.length>20)history.pop();
  expr=String(r);render();renderHistory()}catch(e){document.getElementById('result').textContent='Error'}
}
function render(){document.getElementById('expr').textContent=expr;document.getElementById('result').textContent=expr||'0'}
function renderHistory(){document.getElementById('history').innerHTML=history.map((h,i)=>`<div onclick="expr='${h.result}';render()"><span>${h.expr}</span><span style="color:var(--accent);">${h.result}</span></div>`).join('')}
</script>  <footer style="padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58">

    <a href="https://devkit-tools.xyz/terms.html" style="color:#58a6ff;text-decoration:none;margin:0 8px">Terms</a>
  </footer>
</body></html>
